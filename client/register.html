<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register — AgriMitra</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#0d1f13">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand"><a href="index.html">AgriMitra</a></div>
      <nav class="main-nav" id="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="login.html" class="nav-link">Login</a>
        <a href="dashboard.html" class="nav-link nav-cta">Dashboard</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main style="padding:80px 24px;">
    <section class="dashboard-section" style="max-width:640px;margin:0 auto;">
      <div class="dash-card" style="padding:36px 28px;">
        <div class="dash-card-header" style="margin-bottom:24px;">
          <div>
            <div class="section-label">Farmer Register</div>
            <h2 style="margin-top:10px;font-size:2rem;">Create your account</h2>
          </div>
        </div>

        <div id="auth-message" style="margin-bottom:16px;display:none;padding:14px;border-radius:12px;font-weight:600;"></div>

        <form id="register-form">
          <div class="form-grid">
            <div class="form-field"><label for="register-name">Name</label><input type="text" id="register-name" required placeholder="Ramesh Kumar"></div>
            <div class="form-field"><label for="register-email">Email</label><input type="email" id="register-email" required placeholder="you@example.com"></div>
            <div class="form-field"><label for="register-password">Password</label><input type="password" id="register-password" required placeholder="Choose a strong password"></div>
            <div class="form-field"><label for="register-phone">Phone</label><input type="tel" id="register-phone" required placeholder="+91 98765 43210"></div>
            <div class="form-field"><label for="register-location">Location</label><input type="text" id="register-location" required placeholder="Nashik, Maharashtra"></div>
            <div class="form-field"><label for="register-landArea">Land Area</label><input type="text" id="register-landArea" required placeholder="e.g. 12 acres"></div>
            <div class="form-field"><label for="register-soilType">Soil Type</label><input type="text" id="register-soilType" required placeholder="e.g. Black Cotton"></div>
            <div class="form-field"><label for="register-soilPH">Soil pH</label><input type="text" id="register-soilPH" required placeholder="e.g. 6.8"></div>
            <div class="form-field"><label for="register-irrigation">Irrigation</label><input type="text" id="register-irrigation" required placeholder="e.g. Drip"></div>
          </div>
          <div class="form-actions" style="justify-content:flex-start;margin-top:20px;">
            <button type="submit" class="btn primary">Register</button>
          </div>
        </form>

        <p style="margin-top:22px;color:var(--text-muted);font-size:.95rem;">Already have an account? <a href="login.html" style="color:var(--accent);text-decoration:none;">Sign in here</a>.</p>
      </div>
    </section>
  </main>

  <script src="js/auth.js" defer></script>
</body>
</html>
