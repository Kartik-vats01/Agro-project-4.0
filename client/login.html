<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — AgriMitra</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0d1f13">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand"><a href="index.html">AgriMitra</a></div>
      <nav class="main-nav" id="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="login.html" class="nav-link">Login</a>
        <a href="register.html" class="nav-link">Register</a>
        <a href="dashboard.html" class="nav-link nav-cta">Dashboard</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main style="padding:80px 24px;">
    <section class="dashboard-section" style="max-width:560px;margin:0 auto;">
      <div class="dash-card" style="padding:36px 28px;">
        <div class="dash-card-header" style="margin-bottom:24px;">
          <div>
            <div class="section-label">Farmer Login</div>
            <h2 style="margin-top:10px;font-size:2rem;">Welcome back to AgriMitra</h2>
          </div>
        </div>

        <div id="auth-message" style="display:none;margin-bottom:16px;padding:14px;border-radius:12px;font-weight:600;"></div>

        <form id="login-form">
          <div class="form-grid">
            <div class="form-field">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" required placeholder="you@example.com">
            </div>
            <div class="form-field">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" required placeholder="Enter your password">
            </div>
          </div>
          <div class="form-actions" style="justify-content:flex-start;margin-top:20px;">
            <button type="submit" class="btn primary">Login →</button>
          </div>
        </form>

        <p style="margin-top:22px;color:var(--text-muted);font-size:.95rem;">
          New to AgriMitra? <a href="register.html" style="color:var(--accent);text-decoration:none;">Create your farmer account</a>.
        </p>
      </div>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
